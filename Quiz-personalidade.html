<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Personalidade</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    text-align: center;
    color: white;
    padding: 20px;
    margin: 0;
    box-sizing: border-box;
    padding-bottom: 90px;
}

h1 {
    font-size: 22px;
    padding: 0 10px;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    width: 100%;
    margin: auto;
}

button {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    background: #e91e63;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
}

button:hover {
    opacity: 0.9;
}
</style>
</head>

<body>

<h1>❤️ Que tipo de pessoa você é?</h1>

<div class="box">
    <h2 id="question">Carregando...</h2>
    <div id="answers"></div>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "Você prefere:",
        answers: ["Ficar em casa", "Sair com amigos", "Explorar lugares novos"],
        points: [1,2,3]
    },
    {
        question: "Como reage a problemas?",
        answers: ["Penso bastante", "Peço ajuda", "Resolvo rápido"],
        points: [1,2,3]
    },
    {
        question: "O que mais te define?",
        answers: ["Calmo", "Sociável", "Aventureiro"],
        points: [1,2,3]
    }
];

let current = 0;
let score = 0;

function loadQuestion(){
    let q = quiz[current];
    question.innerText = q.question;
    answers.innerHTML = "";

    q.answers.forEach((a,i)=>{
        let b = document.createElement("button");
        b.innerText = a;
        b.onclick = () => {
            score += q.points[i];
            current++;
            current < quiz.length ? loadQuestion() : showResult();
        }
        answers.appendChild(b);
    });
}

function showResult(){
    let r = score <= 4 ? "🌿 Tranquila e observadora"
        : score <= 7 ? "😊 Sociável e equilibrada"
        : "🔥 Aventureira e cheia de energia";

    question.style.display = "none";
    answers.style.display = "none";

    result.innerHTML = `
        ${r}
        <br><br>
        <button onclick="share()">📲 Compartilhar</button>
    `;
}

function share(){
    window.open(
        `https://wa.me/?text=${encodeURIComponent("Fiz o teste de personalidade!")}`
    );
}

loadQuestion();
</script>

<div style="position:fixed;bottom:0;left:0;width:100%;background:#eee;padding:10px;font-size:14px;">
🔵 Espaço para anúncio
</div>

</body>
</html>
