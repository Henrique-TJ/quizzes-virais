<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Teste de Inteligência</title>

<style>
body {
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    text-align: center;
    color: white;
    padding: 30px;
    padding-bottom: 90px;
}

.box {
    background: white;
    color: black;
    padding: 20px;
    border-radius: 10px;
    max-width: 400px;
    margin: auto;
}

button {
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
}
</style>
</head>

<body>

<h1>🧠 Você é mais inteligente que a média?</h1>

<div class="box">
    <h2 id="question">Carregando...</h2>
    <div id="answers"></div>
    <h3 id="result"></h3>
</div>

<script>
const quiz = [
    {
        question: "Qual número completa: 2, 4, 8, 16, ?",
        answers: ["18", "24", "32", "20"],
        correct: 2
    },
    {
        question: "Quanto é 15 x 6?",
        answers: ["80", "90", "85", "95"],
        correct: 1
    },
    {
        question: "Se você tem 10 e perde 4, fica com:",
        answers: ["6", "5", "4", "7"],
        correct: 0
    }
];

let current=0,score=0;

function loadQuestion(){
    let q=quiz[current];
    question.innerText=q.question;
    answers.innerHTML="";

    q.answers.forEach((a,i)=>{
        let b=document.createElement("button");
        b.innerText=a;
        b.onclick=()=>{
            if(i===q.correct) score++;
            current++;
            current<quiz.length?loadQuestion():showResult();
        }
        answers.appendChild(b);
    });
}

function showResult(){
    let r = score<=1?"😅 Abaixo da média":score==2?"🙂 Na média":"🔥 Acima da média!";

    question.style.display="none";
    answers.style.display="none";
    result.innerHTML = `Você acertou ${score}/3<br><br>${r}
    <br><br><button onclick="share()">📲 Compartilhar</button>`;
}

function share(){
    window.open(`https://wa.me/?text=${encodeURIComponent("Fiz o teste de inteligência!")}`);
}

loadQuestion();
</script>

<div style="position:fixed;bottom:0;width:100%;background:#eee;padding:10px;">
🔵 Espaço para anúncio
</div>

</body>
</html>
