<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNS</title>

<style>
body {
  margin:0;
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  overflow:hidden;
  touch-action: none;
}

#game {
  position:relative;
  width:320px;
  height:500px;
  margin:auto;
  background:#222;
  border:3px solid #555;
  overflow:hidden;
}

/* setas */
.note,.target{
  position:absolute;
  width:70px;
  height:70px;
}

.arrow{
  width:0;height:0;margin:auto;top:15px;position:relative;
}

.left .arrow{
  border-top:20px solid transparent;
  border-bottom:20px solid transparent;
  border-right:30px solid red;
}
.up .arrow{
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-bottom:30px solid lime;
}
.down .arrow{
  border-left:20px solid transparent;
  border-right:20px solid transparent;
  border-top:30px solid cyan;
}
.right .arrow{
  border-top:20px solid transparent;
  border-bottom:20px solid transparent;
  border-left:30px solid yellow;
}

.left{left:0;}
.up{left:80px;}
.down{left:160px;}
.right{left:240px;}

.target{
  bottom:10px;
  border:2px solid white;
}

/* UI */
#score,#combo{font-size:18px;}

#lifeBar{
  width:300px;
  height:20px;
  background:#400;
  margin:10px auto;
}
#life{
  height:100%;
  width:100%;
  background:#0f0;
}

/* GAME OVER */
#gameOver{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

/* feedback */
.feedbackText {
  position: absolute;
  left: 50%;
  top: 350px;
  transform: translateX(-50%);
  font-size: 28px;
  font-weight: bold;
  animation: popText 0.6s ease;
}

.perfeito { color: #00ffcc; }
.bom { color: #ffff00; }
.erro { color: #ff3333; }

@keyframes popText {
  0% { transform: translateX(-50%) scale(0.5); opacity: 0; }
  50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
  100% { transform: translateX(-50%) scale(1); opacity: 0; }
}

/* TOUCH AREAS (invisíveis) */
.touch {
  position:absolute;
  width:70px;
  height:70px;
  bottom:10px;
}
.touch.left { left:0; }
.touch.up { left:80px; }
.touch.down { left:160px; }
.touch.right { left:240px; }

</style>
</head>

<body>

<h2>🎤 MNF</h2>

<button onclick="startGame()">▶️ Começar</button>
<button onclick="togglePause()">⏸ Pausar</button>

<div id="lifeBar"><div id="life"></div></div>

<div id="game">
  <div class="target left"><div class="arrow"></div></div>
  <div class="target up"><div class="arrow"></div></div>
  <div class="target down"><div class="arrow"></div></div>
  <div class="target right"><div class="arrow"></div></div>

  <!-- ÁREAS DE TOQUE -->
  <div class="touch left"></div>
  <div class="touch up"></div>
  <div class="touch down"></div>
  <div class="touch right"></div>
</div>

<div id="score">Pontos: 0</div>
<div id="combo">Combo: 0</div>

<div id="gameOver">
  <h1>💀 GAME OVER</h1>
  <button onclick="startGame()">🔄 Recomeçar</button>
</div>

<script>
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const comboEl = document.getElementById("combo");
const lifeBar = document.getElementById("life");
const gameOverScreen = document.getElementById("gameOver");

let notes=[],score=0,combo=0,life=100;
let running=false,paused=false,gameOver=false;
let speed=4,spawnRate=700;

// som
const ctx = new (window.AudioContext||window.webkitAudioContext)();
function beep(){
  const o=ctx.createOscillator();
  o.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.05);
}

// iniciar
function startGame(){
  notes.forEach(n=>game.removeChild(n.el));
  notes=[];
  score=0; combo=0; life=100;
  running=true; paused=false; gameOver=false;
  gameOverScreen.style.display="none";
  updateUI();
}

// pause
function togglePause(){
  if(!running||gameOver) return;
  paused=!paused;
}

// spawn
function spawn(){
  if(!running||paused||gameOver) return;

  const dirs=["left","up","down","right"];
  let dir=dirs[Math.floor(Math.random()*4)];

  let el=document.createElement("div");
  el.className="note "+dir;
  el.innerHTML='<div class="arrow"></div>';
  el.style.top="-70px";

  game.appendChild(el);
  notes.push({el,dir,y:-70});
}

function loopSpawn(){
  spawn();
  setTimeout(loopSpawn,spawnRate);
}

// update
function update(){
  if(running&&!paused&&!gameOver){
    for(let i=notes.length-1;i>=0;i--){
      let n=notes[i];
      n.y+=speed;
      n.el.style.top=n.y+"px";

      if(n.y>520){
        game.removeChild(n.el);
        notes.splice(i,1);
        miss();
      }
    }
  }
  requestAnimationFrame(update);
}

// hit
function hit(dir){
  if(!running||paused||gameOver) return;

  let best=-1,distMin=999;

  for(let i=0;i<notes.length;i++){
    let n=notes[i];
    if(n.dir!==dir) continue;

    let dist=Math.abs(420-n.y);
    if(dist<distMin){distMin=dist;best=i;}
  }

  if(best!==-1 && distMin<50){
    let n=notes[best];
    game.removeChild(n.el);
    notes.splice(best,1);

    combo++;

    if(distMin<15){
      score+=15;
      showFeedback("PERFEITO 🔥");
    }else{
      score+=10;
      showFeedback("BOM 👍");
    }

    life=Math.min(100,life+5);
    beep();
  }else{
    miss();
  }

  updateUI();
}

// erro
function miss(){
  combo=0;
  score-=10;
  life-=10;

  showFeedback("ERROU ❌");
  updateUI();

  if(life<=0){
    gameOver=true;
    running=false;
    gameOverScreen.style.display="flex";
  }
}

// UI
function updateUI(){
  scoreEl.innerText="Pontos: "+score;
  comboEl.innerText="Combo: "+combo;
  lifeBar.style.width=life+"%";
}

// feedback
function showFeedback(text){
  const el=document.createElement("div");
  el.classList.add("feedbackText");

  if(text.includes("PERFEITO")) el.classList.add("perfeito");
  else if(text.includes("BOM")) el.classList.add("bom");
  else el.classList.add("erro");

  el.innerText=text;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),600);
}

// teclado
document.addEventListener("keydown", e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(e.key)){
    e.preventDefault();
  }

  if(e.key==="a"||e.key==="ArrowLeft") hit("left");
  if(e.key==="w"||e.key==="ArrowUp") hit("up");
  if(e.key==="s"||e.key==="ArrowDown") hit("down");
  if(e.key==="d"||e.key==="ArrowRight") hit("right");
});

// TOUCH (CELULAR)
document.querySelectorAll(".touch").forEach(el=>{
  el.addEventListener("touchstart", e=>{
    e.preventDefault();
    if(el.classList.contains("left")) hit("left");
    if(el.classList.contains("up")) hit("up");
    if(el.classList.contains("down")) hit("down");
    if(el.classList.contains("right")) hit("right");
  });
});

loopSpawn();
update();
</script>
<div class="ad">🔵 Espaço para anúncio</div>
</body>
</html>
